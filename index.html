<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>观片台 · FilmScan Lightbox</title>
</head>
<body>
<header>
  <h1>观 片 台</h1>
  <p>新建卷 · 把照片拖进卷里 · 把整卷拖上台面</p>
</header>

<button class="gear" id="gear" title="微调">⚙</button>

<div class="scene">
  <div class="lightbox" id="lightbox">
    <div class="body pro" id="bodyEl">
      <div class="screen" id="screen">
        <canvas id="bg"></canvas>
        <div class="placeholder" id="placeholder">
          <b>把胶卷放上台面</b>
          从右侧拖一卷过来<br>或点这里新建并导入
        </div>
      </div>
      <span class="nameplate" id="nameplate">FILMSCAN</span>
    </div>
  </div>
</div>

<div class="pieces" id="pieces"></div>

<aside class="tray" id="tray">
  <div class="newroll" id="newRoll"><b>＋</b>新建卷</div>
  <div class="rolls" id="rolls">
    <div class="empty" id="trayEmpty">还没有胶卷<br>点上方新建一卷</div>
  </div>
</aside>
<div class="roll-expand" id="rollExpand"></div>

<!-- 卷设置弹窗:新建/编辑共用,选画幅/类型/张数上限(纯原生,零依赖) -->
<div class="modal-scrim" id="rollModal" hidden>
  <div class="modal-body">
    <h2 class="modal-title" id="rollModalTitle">新建卷</h2>

    <div class="modal-field">
      <div class="modal-label">画幅规格</div>
      <div class="modal-opts" id="rollModalFmt">
        <button data-idx="0">110<small>微型</small></button>
        <button data-idx="1">135<small>35mm</small></button>
        <button data-idx="2">120<small>6×6</small></button>
        <button data-idx="3">4×5<small>大画幅</small></button>
      </div>
    </div>

    <div class="modal-field">
      <div class="modal-label">胶片类型</div>
      <div class="modal-opts" id="rollModalType">
        <button data-v="reversal">反转</button>
        <button data-v="bw">黑白</button>
        <button data-v="negative">负片</button>
      </div>
    </div>

    <div class="modal-field">
      <div class="modal-label">张数上限</div>
      <div class="modal-opts" id="rollModalCap">
        <button data-cap="12">12</button>
        <button data-cap="24">24</button>
        <button data-cap="36">36</button>
        <input type="number" id="rollCapCustom" min="1" placeholder="自定义">
        <button data-cap="">不限</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="modal-btn ghost" id="rollModalCancel">取消</button>
      <button class="modal-btn ok" id="rollModalOk">确定</button>
    </div>
  </div>
</div>

<input id="file" type="file" accept="image/*" multiple hidden>

<div class="dock">
  <div class="deckname" id="deckname">专业观片台</div>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <button class="close" id="closeDrawer">×</button>
  <h2>设置</h2>

  <!-- 第一组:观片台(发光台面相关) -->
  <section class="group">
    <div class="group-h">观片台</div>
    <div class="group-sub">专业观片台 · 背光</div>

    <label class="ctrl">背光亮度 <b id="vGlow">40</b></label>
    <input id="glow" type="range" min="0" max="100" value="40">
  </section>

  <!-- 第二组:胶片(底片本身相关) -->
  <section class="group">
    <div class="group-h">胶片</div>
    <div class="group-sub">底片本身</div>

    <label class="ctrl">底片圆角 <b id="vRadius">0</b></label>
    <input id="radius" type="range" min="0" max="60" value="0">
  </section>

  <!-- 第三组:导出 -->
  <section class="group">
    <div class="group-h">导出</div>
    <label class="ctrl">格式</label>
    <div class="seg" id="fmt">
      <button class="on" data-f="jpg">JPG</button>
      <button data-f="png">PNG</button>
    </div>
    <button class="btn" id="save" disabled>下载图片</button>
  </section>
</aside>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
